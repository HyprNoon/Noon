#!
##! Workspace
# Switching
bind = Super, 1, exec, $switch_ws 1 # Switch to 1
bind = Super, 2, exec, $switch_ws 2 # Switch to 2
bind = Super, 3, exec, $switch_ws 3 # Switch to 3
bind = Super, 4, exec, $switch_ws 4 # Switch to 4
bind = Super, 5, exec, $switch_ws 5 # Switch to 5
bind = Super, 6, exec, $switch_ws 6 # Switch to 6
bind = Super, 7, exec, $switch_ws 7 # Switch to 7
bind = Super, 8, exec, $switch_ws 8 # Switch to 8
bind = Super, 9, exec, $switch_ws 9 # Switch to 9
bind = Super, 0, exec, $switch_ws 10 # Switch to 10

# Special
bind = Super, S, togglespecialworkspace, # Toggle Special Ws
bind = Super, mouse:275, togglespecialworkspace, # [hidden]
bind = Ctrl+Super, BracketLeft, workspace, -1 # [hidden]
bind = Ctrl+Super, BracketRight, workspace, +1 # [hidden]
bind = Ctrl+Super, Up, workspace, -1 # [hidden]
bind = Ctrl+Super, Down, workspace, +1 # [hidden]

bind = Super, Page_Up, workspace, r-1 # Switch Below
bind = Super, Page_Down, workspace, r+1 # Switch Above
bind = Ctrl+Super+Alt, Right, workspace, m+1 # [hidden]
bind = Ctrl+Super+Alt, Left, workspace, m-1 # [hidden]
bind = Ctrl+Super, Page_Down, workspace, r+1  # [hidden]
bind = Ctrl+Super, Page_Up, workspace, r-1 # [hidden]
bind = Super, mouse_up, workspace, +1 # [hidden]
bind = Super, mouse_down, workspace, -1 # [hidden]
bind = Ctrl+Super, mouse_up, workspace, r+1 # [hidden]
bind = Ctrl+Super, mouse_down, workspace, r-1 # [hidden]

##! Window
bind = Super, G, togglegroup # Toggle Group
bind = Super, q, killactive # Kill Active
bind = Super, Q, killactive # [hidden]
bind = Super+Alt, Space, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1600 900 && hyprctl dispatch centerwindow # Float | Center | Expand
bind = Super, P, pin # Toggle Pin

bind = Super Alt, 1, exec, $move_to_ws 1 # Move To ws 1
bind = Super Alt, 2, exec, $move_to_ws 2 # Move To ws 2
bind = Super Alt, 3, exec, $move_to_ws 3 # Move To ws 3
bind = Super Alt, 4, exec, $move_to_ws 4 # Move To ws 4
bind = Super Alt, 5, exec, $move_to_ws 5 # Move To ws 5
bind = Super Alt, 6, exec, $move_to_ws 6 # Move To ws 6
bind = Super Alt, 7, exec, $move_to_ws 7 # Move To ws 7
bind = Super Alt, 8, exec, $move_to_ws 8 # Move To ws 8
bind = Super Alt, 9, exec, $move_to_ws 9 # Move To ws 9
bind = Super Alt, 0, exec, $move_to_ws 10 # Move To ws 10

bind = Super+Shift, mouse_down, movetoworkspace, r-1 # [hidden]
bind = Super+Shift, mouse_up, movetoworkspace, r+1 # [hidden]
bind = Super+Alt, mouse_down, movetoworkspace, -1 # [hidden]
bind = Super+Alt, mouse_up, movetoworkspace, +1 # [hidden]

bind = Super+Alt, Page_Down, movetoworkspace, +1 # [hidden]
bind = Super+Alt, Page_Up, movetoworkspace, -1 # [hidden]
bind = Super+Shift, Page_Down, movetoworkspace, r+1 # [hidden]
bind = Super+Shift, Page_Up, movetoworkspace, r-1 # [hidden]

bind = Super+Alt, S, movetoworkspacesilent, special # Move to Special Ws
bind = Super Alt, T, workspaceopt, allfloat # Toggle All float
bind = Alt, Tab, cyclenext # Cycle Focus / Bring to top
bind = Alt, Tab, bringactivetotop, # [hidden]
#!
##! Utilities
bind = Super+Shift, S, exec, grimblast copy area # Screen Shot Area
# OCR
bind = Super+Shift, T, exec, grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract "tmp.png" - | wl-copy && rm "tmp.png" # OCR
# Color picker
bind = Super+Shift, C, exec, hyprpicker -a # Color Picker
# Fullscreen screenshot
bindld = , Print, Screenshot >> clipboard, exec, grim - | wl-copy # Screen shot full screen
bindld = Ctrl, Print, Screenshot >> clipboard & save, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim $(xdg-user-dir PICTURES)/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png # Screen shot > save
# Recording stuff
bind = Super+Alt, R, exec, $scriptsDir/record_service.sh # Start Recording
bind = Ctrl+Alt, R, exec, $scriptsDir/record_service.sh --fullscreen # Start Recording Full screen
bind = Super+Shift+Alt, R, exec, $scriptsDir/record_service.sh --fullscreen-sound # Start Recording Full screen with sound
# AI
bind = Super+Shift+Alt, mouse:273, exec, ~/.config/ags/scripts/ai/primary-buffer-query.sh # [hidden]
# Zoom
binde = Super, Minus, exec, $scriptsDir/hypr_zoom.sh decrease 0.1 # Zoom out
binde = Super, Equal, exec, $scriptsDir/hypr_zoom.sh increase 0.1 # Zoom in

##! Apps
bind = Super, T, exec, $terminal # Terminal
bind = Super Shift, Return, exec, $terminal_alt # Terminal Alt
bind = Super, E, exec, $file_manager # File Manager
bind = Super, B, exec, $browser # Web browser
bind = Super Shift, B, exec, $browser_alt # Web Browser Alt
bind = Super, C, exec, $editor # Code Editor
bind = Ctrl+Super, V, exec, pavucontrol-qt # Volume Controls
bind = Super, I, exec, $system_settings # System Settings
bind = Ctrl+Shift, Escape, exec, $task_manager # Task Manager
bind = Super Ctrl Shift, Escape, exec, $task_manager_alt # Task Manager Alt
##! Session
bind = Super, L, exec, loginctl lock-session # Lock
bindld = Super+Shift, L, Suspend system, exec, sleep 0.1 && systemctl suspend || loginctl suspend # Suspend
bind = Ctrl+Shift+Alt+Super, Delete, exec, systemctl poweroff || loginctl poweroff # Poweroff

# Cursed stuff
## Make window not amogus large
bind = Ctrl+Super, Backslash, resizeactive, exact 640 480 # [hidden]
bindn = Super Shift , D, exec, $scriptsDir/show_desktop.sh # [hidden]
bindl=,switch:Lid Switch,exec,$scriptsDir/lid_switch.sh # [hidden]

# Testing
bind = Super+Alt, f11, exec, bash -c 'RANDOM_IMAGE=$(find ~/Pictures -type f | grep -v -i "nipple" | grep -v -i "pussy" | shuf -n 1); ACTION=$(notify-send "Test notification with body image" "This notification should contain your user account <b>image</b> and <a href=\"https://discord.com/app\">Discord</a> <b>icon</b>. Oh and here is a random image in your Pictures folder: <img src=\"$RANDOM_IMAGE\" alt=\"Testing image\"/>" -a "Hyprland keybind" -p -h "string:image-path:/var/lib/AccountsService/icons/$USER" -t 6000 -i "discord" -A "openImage=Open profile image" -A "action2=Open the random image" -A "action3=Useless button"); [[ $ACTION == *openImage ]] && xdg-open "/var/lib/AccountsService/icons/$USER"; [[ $ACTION == *action2 ]] && xdg-open \"$RANDOM_IMAGE\"' # [hidden]
bind = Super+Alt, f12, exec, bash -c 'RANDOM_IMAGE=$(find ~/Pictures -type f | grep -v -i "nipple" | grep -v -i "pussy" | shuf -n 1); ACTION=$(notify-send "Test notification" "This notification should contain a random image in your <b>Pictures</b> folder and <a href=\"https://discord.com/app\">Discord</a> <b>icon</b>.\n<i>Flick right to dismiss!</i>" -a "Discord (fake)" -p -h "string:image-path:$RANDOM_IMAGE" -t 6000 -i "discord" -A "openImage=Open profile image" -A "action2=Useless button" -A "action3=Cry more"); [[ $ACTION == *openImage ]] && xdg-open "/var/lib/AccountsService/icons/$USER"' # [hidden]
bind = Super+Alt, Equal, exec, notify-send "Urgent notification" "Ah hell no" -u critical -a 'Hyprland keybind' # [hidden]
